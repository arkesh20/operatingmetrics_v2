<html lang="en">
<head>

<style>
:root{--bg:#0b0e19;--bg2:#12162b;--bg3:#191f3a;--bg4:#222847;--border:#2a3158;--border2:#353c6a;--text:#e8ecf4;--text2:#8a93b8;--text3:#5c648a;--indigo:#6366f1;--indigo2:#818cf8;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--cyan:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;opacity:.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.shell{max-width:1280px;margin:0 auto;padding:28px 24px;position:relative;z-index:1}
header{margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
h1{font-size:24px;font-weight:700;letter-spacing:-.4px;background:linear-gradient(135deg,#e8ecf4 30%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:12px;color:var(--text2);margin-top:3px}
.live-badge{display:inline-flex;align-items:center;gap:6px;font:500 11px 'JetBrains Mono',monospace;color:var(--green);background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:6px;padding:5px 10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-size:13px;color:var(--text2)}
#loadStatus{font-size:11px;color:var(--text3);margin-top:4px}
#errorBox{display:none;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);border-radius:10px;padding:16px 20px;margin:24px 0;color:var(--rose);font-size:13px;line-height:1.6}
.metric-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.metric-tab{padding:10px 20px 12px;font:600 13px 'DM Sans',sans-serif;color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .2s;border-radius:8px 8px 0 0}
.metric-tab:hover{color:var(--text);background:var(--bg2)}
.metric-tab.active{color:#fff;border-bottom-color:var(--indigo);background:var(--bg2)}
.metric-tab .tab-count{font:500 10px 'JetBrains Mono',monospace;color:var(--text3);display:block;margin-top:2px}
.metric-tab.active .tab-count{color:var(--indigo2)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text2);margin-bottom:5px}
.kpi-val{font:700 22px/1.1 'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.kpi-up{color:var(--green)}.kpi-down{color:var(--rose)}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.view-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.view-btn{padding:7px 16px;font:600 11px 'DM Sans',sans-serif;color:var(--text2);background:none;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.view-btn.active{color:#fff;background:var(--indigo)}
.view-btn:hover:not(.active){color:var(--text);background:var(--bg3)}
.chips-area{margin-bottom:14px}
.chip-actions{display:flex;gap:8px;margin-bottom:6px}
.chip-act{font:500 11px 'DM Sans',sans-serif;color:var(--indigo2);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 11px;border-radius:18px;font:600 10px 'DM Sans',sans-serif;cursor:pointer;border:1.5px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--text3);color:var(--text)}.chip.on{color:#fff;border-color:transparent}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:22px}
.chart-box{position:relative;height:380px}
.chart-box canvas{width:100%!important;height:100%!important}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px}
.table-scroll{max-height:500px;overflow:auto}
.table-scroll::-webkit-scrollbar{width:5px;height:5px}
.table-scroll::-webkit-scrollbar-track{background:var(--bg2)}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{position:sticky;top:0;z-index:2;background:var(--bg3);padding:9px 10px;text-align:right;font-weight:700;color:var(--text);border-bottom:2px solid var(--border);white-space:nowrap}
thead th:first-child{text-align:left;min-width:100px}
tbody td{padding:6px 10px;text-align:right;border-bottom:1px solid rgba(42,49,88,.4);font:400 11px 'JetBrains Mono',monospace;color:var(--text2)}
tbody td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text)}
tbody tr:hover td{background:rgba(99,102,241,.06)}
.col-total{font-weight:700;color:var(--text);background:rgba(99,102,241,.04)}
.v-high{color:var(--green)!important}.v-med{color:var(--amber)!important}
.heat-cell{text-align:center!important;font:500 10px 'JetBrains Mono',monospace!important;padding:5px 5px!important;border-right:1px solid rgba(42,49,88,.15)}
.section-title{font:700 15px 'DM Sans',sans-serif;color:var(--text);margin:28px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-title:first-of-type{margin-top:0}
.avg-toggle{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:18px;font:700 11px 'DM Sans',sans-serif;cursor:pointer;border:2px dashed var(--amber);color:var(--amber);background:transparent;transition:all .15s;user-select:none;margin-left:8px}
.avg-toggle:hover{background:rgba(251,191,36,.08)}
.avg-toggle.on{border-style:solid;background:var(--amber);color:var(--bg)}
.avg-toggle .avg-icon{width:14px;height:2px;background:currentColor;border-radius:1px;position:relative}
.avg-toggle .avg-icon::before{content:'';position:absolute;width:14px;height:2px;background:currentColor;border-radius:1px;top:-4px;left:2px;transform:rotate(-3deg)}
.chip-sep{width:1px;height:20px;background:var(--border);margin:0 6px;align-self:center}
.chart-label{font:600 12px 'DM Sans',sans-serif;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.anim{animation:fadeUp .45s ease both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}

/* Password Gate */
#authGate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 40px;max-width:380px;width:90%;text-align:center;animation:fadeUp .5s ease both}
.auth-card h2{font:700 22px 'DM Sans',sans-serif;margin-bottom:6px;background:linear-gradient(135deg,#e8ecf4 30%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-card p{font-size:13px;color:var(--text2);margin-bottom:24px}
.auth-input{width:100%;padding:11px 16px;font:500 14px 'DM Sans',sans-serif;color:var(--text);background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;outline:none;transition:border-color .2s;text-align:center;letter-spacing:1px}
.auth-input:focus{border-color:var(--indigo)}
.auth-input::placeholder{color:var(--text3);letter-spacing:0}
.auth-btn{width:100%;padding:11px;margin-top:12px;font:600 13px 'DM Sans',sans-serif;color:#fff;background:var(--indigo);border:none;border-radius:8px;cursor:pointer;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-error{font-size:12px;color:var(--rose);margin-top:10px;min-height:18px}
</style>

<body>

<!-- ═══ PASSWORD GATE ═══ -->
<div id="authGate">
  <div class="auth-card">
    <p>Enter password to access the dashboard</p>
    <input type="password" class="auth-input" id="authInput" placeholder="Password" autofocus>
    <button class="auth-btn" id="authBtn">Enter</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<script>
// SHA-256 hash of the password (not stored in plaintext)
const HASH = '651b7be3d05403df3d1d58bbb6a2f496a54c94b225d4d6cfe75f36161ff11be0';

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkAuth() {
  const pw = document.getElementById('authInput').value;
  const h = await sha256(pw);
  if (h === HASH) {
    sessionStorage.setItem('cc_auth', '1');
    document.getElementById('authGate').style.display = 'none';
  } else {
    document.getElementById('authError').textContent = 'Incorrect password';
    document.getElementById('authInput').value = '';
    document.getElementById('authInput').focus();
  }
}

// Skip gate if already authenticated this session
if (sessionStorage.getItem('cc_auth') === '1') {
  document.getElementById('authGate').style.display = 'none';
}

document.getElementById('authBtn').addEventListener('click', checkAuth);
document.getElementById('authInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });
</script>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════ */
const SHEET_ID = '1ObNlku8IJ7FESCsWQ6kIsPiCpw5tEcbNOx583SC7ufY';
const PIPELINE_TABS = {
  created: { sheetName: 'Leads Created', label: 'Leads Created' },
  booked:  { sheetName: 'ICs Booked',    label: 'ICs Booked'    },
  closed:  { sheetName: 'Deals Closed',  label: 'Deals Closed'  }
};
const STUDENT_TAB_NAME = 'Student Loads';
function csvUrl(name) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`; }

const PALETTE = ["#6366f1","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#3b82f6","#84cc16","#a855f7","#06b6d4","#e11d48","#22d3ee","#d946ef","#facc15","#4ade80","#fb923c","#818cf8","#2dd4bf","#f43f5e","#34d399","#0ea5e9","#e879f9"];

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
let ALL_MARKETS = [];
let METRICS = {};            // pipeline data { weeks, markets, grid }
let STUDENT_DATA = null;     // { strat: { months, regions, grid }, ssm: { months, regions, grid } }
let currentMetric = 'created';
let currentView = 'chart';
let selected = new Set();    // pipeline market chips
let selectedRegions = new Set(); // student region chips
let showAverage = true;          // average line toggle
let chart = null, totalChart = null, stratChart = null, ssmChart = null;

/* ═══════════════════════════════════════════════════════════
   PARSERS
   ═══════════════════════════════════════════════════════════ */

// Parse pipeline tabs (Leads/Booked/Closed): pivot with dates in col A, markets in header row
function parsePivotCSV(csvText) {
  const rows = Papa.parse(csvText, { header: false, skipEmptyLines: true }).data;
  let headerRowIdx = -1;
  for (let r = 0; r < Math.min(rows.length, 15); r++) {
    const textCells = rows[r].filter((c, i) => i > 0 && (c||'').trim() && isNaN(Number((c||'').replace(/,/g,'')))).length;
    if (textCells >= 5) { headerRowIdx = r; break; }
  }
  if (headerRowIdx === -1) throw new Error('Could not find market header row.');
  const hdr = rows[headerRowIdx], markets = [], mCols = [];
  for (let c = 1; c < hdr.length; c++) {
    const n = (hdr[c]||'').trim();
    if (!n || n.toLowerCase()==='sum' || n.toLowerCase()==='total') continue;
    markets.push(n); mCols.push(c);
  }
  const weeks = [], grid = [];
  for (let r = headerRowIdx+1; r < rows.length; r++) {
    const ds = (rows[r][0]||'').trim();
    if (!ds || isNaN(new Date(ds).getTime())) continue;
    weeks.push(ds);
    grid.push(mCols.map(c => parseInt((rows[r][c]||'').replace(/,/g,''),10)||0));
  }
  return { weeks, markets, grid };
}

// Parse student loads tab: two stacked tables (Strat then SSM)
// Each table: header row has "Service Region" then month columns, data rows are regions
function parseStudentCSV(csvText) {
  const rows = Papa.parse(csvText, { header: false, skipEmptyLines: false }).data;

  function findSection(startRow) {
    // Find next row that starts with "Service Region" (the header)
    let headerIdx = -1;
    for (let r = startRow; r < rows.length; r++) {
      const cell = (rows[r][0]||'').trim().toLowerCase();
      if (cell.includes('service region') || cell === 'service region') {
        headerIdx = r; break;
      }
    }
    if (headerIdx === -1) return null;

    // Extract month headers from columns B onward — ONLY keep date-like values (e.g. "Mar-26")
    const hdr = rows[headerIdx];
    const months = [], mCols = [];
    const monthPattern = /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[-\s]?\d{2,4}$/i;
    for (let c = 1; c < hdr.length; c++) {
      const v = (hdr[c]||'').trim();
      if (!v) continue;
      if (!monthPattern.test(v)) continue; // skip non-date columns like "Service Region", YoY summaries
      months.push(v); mCols.push(c);
    }

    // Read data rows until "Average" or blank or next section
    const regions = [], grid = [];
    let avgRow = null;
    for (let r = headerIdx+1; r < rows.length; r++) {
      const label = (rows[r][0]||'').trim();
      if (!label) break;
      const vals = mCols.map(c => parseInt((rows[r][c]||'').replace(/,/g,''),10)||0);
      if (label.toLowerCase() === 'average') {
        avgRow = vals;
        break;
      }
      regions.push(label);
      grid.push(vals);
    }

    return { months, regions, grid, avgRow, endRow: headerIdx + regions.length + 3 };
  }

  const strat = findSection(0);
  if (!strat) throw new Error('Could not find Students/Strat section.');
  const ssm = findSection(strat.endRow);
  if (!ssm) throw new Error('Could not find Students/SSM section.');

  return { strat, ssm };
}

/* ═══════════════════════════════════════════════════════════
   FETCH ALL DATA
   ═══════════════════════════════════════════════════════════ */
async function loadAllData() {
  const status = document.getElementById('loadStatus');
  try {
    // Pipeline tabs
    for (const [key, tab] of Object.entries(PIPELINE_TABS)) {
      status.textContent = `Loading ${tab.label}…`;
      const resp = await fetch(csvUrl(tab.sheetName));
      if (!resp.ok) throw new Error(`Failed to fetch "${tab.sheetName}": HTTP ${resp.status}`);
      METRICS[key] = { ...parsePivotCSV(await resp.text()), label: tab.label };
    }
    ALL_MARKETS = METRICS.created.markets;
    selected = new Set(['USA']);

    // Student loads tab
    status.textContent = 'Loading Student Loads…';
    const sResp = await fetch(csvUrl(STUDENT_TAB_NAME));
    if (!sResp.ok) throw new Error(`Failed to fetch "${STUDENT_TAB_NAME}": HTTP ${sResp.status}`);
    STUDENT_DATA = parseStudentCSV(await sResp.text());
    selectedRegions = new Set(['USCA']);

    // Show UI
    document.getElementById('loader').style.display = 'none';
    document.getElementById('mainUI').style.display = '';
    document.getElementById('tagline').textContent = `${METRICS.created.weeks.length} weeks · ${ALL_MARKETS.length} markets`;
    document.getElementById('countCreated').textContent = `${METRICS.created.weeks.length} weeks`;
    document.getElementById('countBooked').textContent = `${METRICS.booked.weeks.length} weeks`;
    document.getElementById('countClosed').textContent = `${METRICS.closed.weeks.length} weeks`;
    document.getElementById('countStudents').textContent = `${STUDENT_DATA.strat.months.length} months`;

    renderAll();
  } catch (err) {
    document.getElementById('loader').style.display = 'none';
    const box = document.getElementById('errorBox');
    box.style.display = '';
    box.innerHTML = `<strong>Failed to load:</strong> ${err.message}<br><br>
      Expected tabs: <code>Leads Created</code>, <code>ICs Booked</code>, <code>Deals Closed</code>, <code>${STUDENT_TAB_NAME}</code><br>
      <small style="color:var(--text3)">Check console (F12) for details.</small>`;
    console.error(err);
  }
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function fmtWeek(w) {
  const d = new Date(w); if (isNaN(d)) return w;
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[d.getMonth()]} ${d.getDate()}, '${String(d.getFullYear()).slice(2)}`;
}
function colorFor(m) { return PALETTE[ALL_MARKETS.indexOf(m) % PALETTE.length]; }
function regionColor(r) {
  const regions = STUDENT_DATA ? STUDENT_DATA.strat.regions : [];
  return PALETTE[regions.indexOf(r) % PALETTE.length];
}
function isStudentTab() { return currentMetric === 'students'; }

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════ */
document.getElementById('metricTabs').addEventListener('click', e => {
  const btn = e.target.closest('.metric-tab'); if (!btn) return;
  document.querySelectorAll('.metric-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentMetric = btn.dataset.metric;
  renderAll();
});

document.getElementById('viewToggle').addEventListener('click', e => {
  const btn = e.target.closest('.view-btn'); if (!btn) return;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentView = btn.dataset.view;
  renderAll();
});

function renderAll() {
  renderKPIs();
  if (isStudentTab()) {
    document.getElementById('pipelinePanel').style.display = 'none';
    document.getElementById('studentPanel').style.display = '';
    renderStudentView();
  } else {
    document.getElementById('pipelinePanel').style.display = '';
    document.getElementById('studentPanel').style.display = 'none';
    renderPipelineView();
  }
}

/* ═══════════════════════════════════════════════════════════
   KPIs
   ═══════════════════════════════════════════════════════════ */
function renderKPIs() {
  const el = document.getElementById('kpis');
  if (isStudentTab()) {
    renderStudentKPIs(el); return;
  }
  const ds = METRICS[currentMetric]; if (!ds) return;
  const totals = ds.grid.map(r => r.reduce((a,b) => a+b, 0));
  const latest = totals[0]||0, prev = totals[1]||0;
  const wow = prev ? ((latest-prev)/prev*100).toFixed(1) : '—';
  const wSign = wow!=='—' ? (parseFloat(wow)>=0?'+':'') : '';
  const wCls = parseFloat(wow)>=0 ? 'kpi-up' : 'kpi-down';
  const last4 = totals.slice(0,4).reduce((a,b)=>a+b,0);
  const prev4 = totals.slice(4,8).reduce((a,b)=>a+b,0);
  const mom = prev4 ? ((last4-prev4)/prev4*100).toFixed(1) : '—';
  const mSign = mom!=='—' ? (parseFloat(mom)>=0?'+':'') : '';
  const mCls = parseFloat(mom)>=0 ? 'kpi-up' : 'kpi-down';
  const l52 = totals.slice(0,52);
  const avg52 = l52.length ? Math.round(l52.reduce((a,b)=>a+b,0)/l52.length) : 0;
  const peak = Math.max(...totals), peakIdx = totals.indexOf(peak);

  el.innerHTML = `
    <div class="kpi"><div class="kpi-label">Latest Week</div><div class="kpi-val">${latest.toLocaleString()}</div><div class="kpi-sub ${wCls}">${wSign}${wow}% WoW</div></div>
    <div class="kpi"><div class="kpi-label">Latest Month</div><div class="kpi-val">${last4.toLocaleString()}</div><div class="kpi-sub ${mCls}">${mSign}${mom}% MoM</div></div>
    <div class="kpi"><div class="kpi-label">52-Week Avg</div><div class="kpi-val">${avg52.toLocaleString()}</div><div class="kpi-sub">per week</div></div>
    <div class="kpi"><div class="kpi-label">Peak Week</div><div class="kpi-val">${peak.toLocaleString()}</div><div class="kpi-sub">${fmtWeek(ds.weeks[peakIdx])}</div></div>`;
}

function renderStudentKPIs(el) {
  const s = STUDENT_DATA; if (!s) return;
  // Avg row: index 0 = most recent month
  const stratLatest = s.strat.avgRow ? s.strat.avgRow[0] : 0;
  const ssmLatest   = s.ssm.avgRow   ? s.ssm.avgRow[0]   : 0;

  // YoY: compare avg of first 12 months vs next 12 months
  function yoy(avgRow) {
    if (!avgRow || avgRow.length < 13) return '—';
    const recent = avgRow.slice(0, 12).reduce((a,b)=>a+b,0) / 12;
    const prior  = avgRow.slice(12, 24).reduce((a,b)=>a+b,0) / Math.min(12, avgRow.length - 12);
    return prior ? (((recent - prior) / prior) * 100).toFixed(1) : '—';
  }
  const stratYoY = yoy(s.strat.avgRow);
  const ssmYoY   = yoy(s.ssm.avgRow);
  const sySign = stratYoY!=='—' ? (parseFloat(stratYoY)>=0?'+':'') : '';
  const syCls  = parseFloat(stratYoY)>=0 ? 'kpi-up' : 'kpi-down';
  const smSign = ssmYoY!=='—' ? (parseFloat(ssmYoY)>=0?'+':'') : '';
  const smCls  = parseFloat(ssmYoY)>=0 ? 'kpi-up' : 'kpi-down';

  el.innerHTML = `
    <div class="kpi"><div class="kpi-label">Avg Students / Strat</div><div class="kpi-val">${stratLatest}</div><div class="kpi-sub">Latest month</div></div>
    <div class="kpi"><div class="kpi-label">Avg Students / SSM</div><div class="kpi-val">${ssmLatest}</div><div class="kpi-sub">Latest month</div></div>
    <div class="kpi"><div class="kpi-label">Strat YoY Δ</div><div class="kpi-val ${syCls}">${sySign}${stratYoY}%</div><div class="kpi-sub">12-mo avg vs prior 12-mo</div></div>
    <div class="kpi"><div class="kpi-label">SSM YoY Δ</div><div class="kpi-val ${smCls}">${smSign}${ssmYoY}%</div><div class="kpi-sub">12-mo avg vs prior 12-mo</div></div>`;
}

/* ═══════════════════════════════════════════════════════════
   PIPELINE VIEWS
   ═══════════════════════════════════════════════════════════ */
function renderPipelineView() {
  const isChart = currentView === 'chart';
  document.getElementById('chartPanel').style.display = isChart ? '' : 'none';
  document.getElementById('tablePanel').style.display = isChart ? 'none' : '';
  if (isChart) { renderChips(); buildTotalChart(); buildChart(); }
  else renderPipelineTable();
}

// Chips
function renderChips() {
  document.getElementById('chipBox').innerHTML = ALL_MARKETS.map(m => {
    const c = colorFor(m), on = selected.has(m);
    return `<span class="chip${on?' on':''}" style="${on?'background:'+c+';color:#fff;border-color:'+c:''}" onclick="toggleChip('${m}')">${m}</span>`;
  }).join('');
}
function toggleChip(m) { selected.has(m)?selected.delete(m):selected.add(m); renderChips(); buildChart(); }
function pickTop5() {
  const ds = METRICS[currentMetric];
  const t = ALL_MARKETS.map((m,i) => ({m, t:ds.grid.reduce((s,r)=>s+(r[i]||0),0)})).sort((a,b)=>b.t-a.t);
  selected = new Set(t.slice(0,5).map(x=>x.m)); renderChips(); buildChart();
}
function pickAll() { selected = new Set(ALL_MARKETS); renderChips(); buildChart(); }
function pickNone() { selected.clear(); renderChips(); buildChart(); }

// Total chart
function buildTotalChart() {
  const ds = METRICS[currentMetric]; if (!ds) return;
  const labels = [...ds.weeks].reverse().map(fmtWeek);
  const totals = [...ds.grid].reverse().map(r => r.reduce((a,b)=>a+b,0));

  // Compute L4W trailing average (each point = avg of current + prior 3 weeks)
  const l4w = totals.map((v, i) => {
    const window = totals.slice(Math.max(0, i - 3), i + 1);
    return Math.round(window.reduce((a, b) => a + b, 0) / window.length);
  });

  document.getElementById('totalChartTitle').textContent = `Total ${ds.label} — All Markets`;
  if (totalChart) totalChart.destroy();
  totalChart = new Chart(document.getElementById('totalCanvas'), {
    type:'line',
    data:{labels, datasets:[
      {label:`Total ${ds.label}`,data:totals,borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,.06)',borderWidth:1.5,pointRadius:0,pointHoverRadius:4,tension:.35,fill:true,order:1},
      {label:'L4W Average',data:l4w,borderColor:'#fbbf24',backgroundColor:'transparent',borderWidth:2.5,borderDash:[],pointRadius:0,pointHoverRadius:5,tension:.4,fill:false,order:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:12,padding:10,font:{size:10,family:'DM Sans'},color:'#8a93b8',usePointStyle:false}},
        tooltip:{backgroundColor:'rgba(11,14,25,.95)',borderColor:'#2a3158',borderWidth:1,titleFont:{size:12,family:'DM Sans'},bodyFont:{size:11,family:'JetBrains Mono'},padding:10,cornerRadius:8,
          callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toLocaleString()}`}}},
      scales:{x:{ticks:{font:{size:9,family:'DM Sans'},color:'#8a93b8',maxRotation:60,autoSkip:true,maxTicksLimit:25},grid:{color:'rgba(42,49,88,.3)'}},y:{beginAtZero:true,ticks:{font:{size:10,family:'JetBrains Mono'},color:'#8a93b8',callback:v=>v.toLocaleString()},grid:{color:'rgba(42,49,88,.3)'}}}}
  });
}

// Market chart
function buildChart() {
  const ds = METRICS[currentMetric]; if (!ds) return;
  const labels = [...ds.weeks].reverse().map(fmtWeek);
  const datasets = ALL_MARKETS.filter(m=>selected.has(m)).map(m => {
    const mi = ALL_MARKETS.indexOf(m);
    return {label:m,data:[...ds.grid].reverse().map(r=>r[mi]||0),borderColor:colorFor(m),backgroundColor:colorFor(m)+'18',borderWidth:2,pointRadius:ds.weeks.length>20?1:3,pointHoverRadius:5,tension:.35,fill:false};
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainCanvas'), {
    type:'line', data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:8,font:{size:10,family:'DM Sans'},color:'#8a93b8'}},
        tooltip:{backgroundColor:'rgba(11,14,25,.95)',borderColor:'#2a3158',borderWidth:1,titleFont:{size:12,family:'DM Sans'},bodyFont:{size:11,family:'JetBrains Mono'},padding:10,cornerRadius:8,displayColors:true,boxWidth:8,boxPadding:4,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toLocaleString()}`}}},
      scales:{x:{ticks:{font:{size:9,family:'DM Sans'},color:'#8a93b8',maxRotation:60,autoSkip:true,maxTicksLimit:30},grid:{color:'rgba(42,49,88,.3)'}},
        y:{beginAtZero:true,title:{display:true,text:ds.label,font:{size:12,family:'DM Sans'},color:'#8a93b8'},ticks:{font:{size:10,family:'JetBrains Mono'},color:'#8a93b8',callback:v=>v.toLocaleString()},grid:{color:'rgba(42,49,88,.3)'}}}}
  });
}

// Pipeline table
function renderPipelineTable() {
  const ds = METRICS[currentMetric]; if (!ds) return;
  const flat = ds.grid.flat(), sorted = [...flat].sort((a,b)=>a-b);
  const p90 = sorted[Math.floor(sorted.length*.9)]||1, p70 = sorted[Math.floor(sorted.length*.7)]||1;
  let h = '<table><thead><tr><th>Week</th>';
  ds.markets.forEach(m => h += `<th>${m}</th>`);
  h += '<th class="col-total">Total</th></tr></thead><tbody>';
  ds.grid.forEach((row,ri) => {
    const t = row.reduce((a,b)=>a+b,0);
    h += `<tr><td>${fmtWeek(ds.weeks[ri])}</td>`;
    row.forEach(v => { h += `<td class="${v>=p90?'v-high':v>=p70?'v-med':''}">${v.toLocaleString()}</td>`; });
    h += `<td class="col-total">${t.toLocaleString()}</td></tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('tableMount').innerHTML = h;
}

/* ═══════════════════════════════════════════════════════════
   STUDENT LOADS VIEWS
   ═══════════════════════════════════════════════════════════ */
function renderStudentView() {
  const isChart = currentView === 'chart';
  document.getElementById('studentChartView').style.display = isChart ? '' : 'none';
  document.getElementById('studentTableView').style.display = isChart ? 'none' : '';
  if (isChart) { renderRegionChips(); buildStudentCharts(); }
  else renderStudentTables();
}

// Region chips (shared by both Strat and SSM)
function renderRegionChips() {
  if (!STUDENT_DATA) return;
  const chips = STUDENT_DATA.strat.regions.map(r => {
    const c = regionColor(r), on = selectedRegions.has(r);
    return `<span class="chip${on?' on':''}" style="${on?'background:'+c+';color:#fff;border-color:'+c:''}" onclick="toggleRegion('${r}')">${r}</span>`;
  }).join('');
  const avgBtn = `<span class="chip-sep"></span><span class="avg-toggle${showAverage?' on':''}" onclick="toggleAverage()"><span class="avg-icon"></span> Average</span>`;
  document.getElementById('regionChips').innerHTML = chips + avgBtn;
}
function toggleRegion(r) { selectedRegions.has(r)?selectedRegions.delete(r):selectedRegions.add(r); renderRegionChips(); buildStudentCharts(); }
function toggleAverage() { showAverage = !showAverage; renderRegionChips(); buildStudentCharts(); }
function pickAllRegions() { selectedRegions = new Set(STUDENT_DATA.strat.regions); renderRegionChips(); buildStudentCharts(); }
function pickNoRegions() { selectedRegions.clear(); renderRegionChips(); buildStudentCharts(); }

function buildStudentCharts() {
  if (!STUDENT_DATA) return;
  buildOneStudentChart(STUDENT_DATA.strat, 'stratCanvas', 'Students / Strat', 'strat');
  buildOneStudentChart(STUDENT_DATA.ssm,   'ssmCanvas',   'Students / SSM',   'ssm');
}

function buildOneStudentChart(ds, canvasId, title, which) {
  const labels = [...ds.months].reverse();
  const datasets = ds.regions.filter(r => selectedRegions.has(r)).map(r => {
    const ri = ds.regions.indexOf(r);
    return {
      label: r,
      data: [...ds.grid[ri]].reverse(),
      borderColor: regionColor(r),
      backgroundColor: regionColor(r) + '18',
      borderWidth: 2,
      pointRadius: ds.months.length > 20 ? 1 : 3,
      pointHoverRadius: 5,
      tension: 0.35,
      fill: false
    };
  });

  // Add Average line if toggled on
  if (showAverage && ds.avgRow) {
    datasets.push({
      label: 'Average',
      data: [...ds.avgRow].reverse(),
      borderColor: '#fbbf24',
      backgroundColor: 'rgba(251,191,36,.08)',
      borderWidth: 3,
      borderDash: [6, 3],
      pointRadius: ds.months.length > 20 ? 0 : 3,
      pointHoverRadius: 6,
      pointBackgroundColor: '#fbbf24',
      tension: 0.35,
      fill: false,
      order: -1  // draw on top
    });
  }

  if (which === 'strat' && stratChart) stratChart.destroy();
  if (which === 'ssm' && ssmChart) ssmChart.destroy();

  const c = new Chart(document.getElementById(canvasId), {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 10, padding: 8, font: { size: 10, family: 'DM Sans' }, color: '#8a93b8' } },
        tooltip: { backgroundColor:'rgba(11,14,25,.95)', borderColor:'#2a3158', borderWidth:1,
          titleFont:{size:12,family:'DM Sans'}, bodyFont:{size:11,family:'JetBrains Mono'},
          padding:10, cornerRadius:8, displayColors:true, boxWidth:8, boxPadding:4 }
      },
      scales: {
        x: { ticks: { font:{size:9,family:'DM Sans'}, color:'#8a93b8', maxRotation:60, autoSkip:true, maxTicksLimit:20 }, grid:{color:'rgba(42,49,88,.3)'} },
        y: { beginAtZero: false, title: { display:true, text:title, font:{size:12,family:'DM Sans'}, color:'#8a93b8' },
          ticks: { font:{size:10,family:'JetBrains Mono'}, color:'#8a93b8' }, grid:{color:'rgba(42,49,88,.3)'} }
      }
    }
  });

  if (which === 'strat') stratChart = c;
  else ssmChart = c;
}

function renderStudentTables() {
  if (!STUDENT_DATA) return;
  renderOneStudentTable(STUDENT_DATA.strat, 'stratTableMount');
  renderOneStudentTable(STUDENT_DATA.ssm,   'ssmTableMount');
}

function renderOneStudentTable(ds, mountId) {
  const flat = ds.grid.flat(), sorted = [...flat].sort((a,b)=>a-b);
  const p90 = sorted[Math.floor(sorted.length*.9)]||1, p70 = sorted[Math.floor(sorted.length*.7)]||1;
  let h = '<table><thead><tr><th>Region</th>';
  ds.months.forEach(m => h += `<th>${m}</th>`);
  h += '</tr></thead><tbody>';
  ds.regions.forEach((r, ri) => {
    h += `<tr><td>${r}</td>`;
    ds.grid[ri].forEach(v => { h += `<td class="${v>=p90?'v-high':v>=p70?'v-med':''}">${v}</td>`; });
    h += '</tr>';
  });
  // Average row
  if (ds.avgRow) {
    h += '<tr style="border-top:2px solid var(--border)"><td style="font-weight:700;color:var(--indigo2)">Average</td>';
    ds.avgRow.forEach(v => h += `<td class="col-total">${v}</td>`);
    h += '</tr>';
  }
  h += '</tbody></table>';
  document.getElementById(mountId).innerHTML = h;
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
loadAllData();
</script>
